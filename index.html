<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Crypto Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0e11;
            --container-bg: #151921;
            --accent-color: #00a884; /* Цвет как в WhatsApp */
            --text-color: #e9edef;
            --border-color: #30363d;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-color); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; 
            display: flex; 
            justify-content: center;
            height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 500px; 
            background: var(--container-bg); 
            display: flex; 
            flex-direction: column; 
            position: relative;
        }

        /* ЭКРАН ВХОДА */
        #login-screen {
            padding: 40px 20px;
            justify-content: center;
            align-items: center;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
        }

        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            background: #20262d; 
            border: 1px solid var(--border-color); 
            color: white; 
            border-radius: 10px; 
            font-size: 16px; /* Предотвращает зум на iPhone */
            outline: none;
        }

        input:focus { border-color: var(--accent-color); }

        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.7; }

        /* ЭКРАН ЧАТА */
        #chat-screen { 
            display: none; 
            flex-direction: column; 
            height: 100vh; 
        }

        .header {
            padding: 15px;
            background: #20262d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        #messages { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
        }

        .msg-item { 
            background: #20262d; 
            padding: 10px 15px; 
            border-radius: 10px; 
            max-width: 85%; 
            word-wrap: break-word;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .input-area {
            padding: 10px;
            background: #20262d;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #msgInput { margin: 0; flex-grow: 1; }
        .send-btn { width: auto; padding: 12px 20px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2 style="margin-bottom: 30px;">🔐 Anon Chat</h2>
    <input type="text" id="userName" placeholder="Ваше имя">
    <input type="password" id="seedPhrase" placeholder="Сид-фраза">
    <button onclick="enterChat()">Войти в чат</button>
</div>

<div id="chat-screen">
    <div class="header">
        <span id="display-name" style="font-weight: bold;"></span>
        <button onclick="loadMessages()" style="width:auto; padding: 5px 10px; font-size: 12px; background: #30363d;">Обновить</button>
    </div>
    
    <div id="messages"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Сообщение..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    const GITHUB_TOKEN = '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'; 
    const GIST_ID = '4dc342970c7033ac1ec0da5143a4098b';
    const FILE_NAME = 'chat.txt';

    let currentUser = '';
    let currentSeed = '';

    function enterChat() {
        currentUser = document.getElementById('userName').value.trim();
        currentSeed = document.getElementById('seedPhrase').value.trim();

        if (!currentUser || !currentSeed) return alert("Введите данные!");

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('display-name').innerText = currentUser;
        
        loadMessages();
    }

    // Обработка Enter
    document.getElementById('msgInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });

    async function loadMessages() {
        const msgDiv = document.getElementById('messages');
        try {
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}?t=${Date.now()}`);
            const data = await response.json();
            const content = data.files[FILE_NAME].content;
            
            const lines = content.split('\n');
            msgDiv.innerHTML = '';

            lines.forEach(line => {
                if (!line.trim()) return;
                try {
                    const bytes = CryptoJS.AES.decrypt(line, currentSeed);
                    const decrypted = bytes.toString(CryptoJS.enc.Utf8);
                    if (decrypted) {
                        msgDiv.innerHTML += `<div class="msg-item">${decrypted}</div>`;
                    }
                } catch (e) {}
            });
            msgDiv.scrollTop = msgDiv.scrollHeight;
        } catch (err) {
            msgDiv.innerHTML = '<center>Ошибка загрузки</center>';
        }
    }

    async function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        const fullMessage = `${currentUser}: ${text}`;
        const encrypted = CryptoJS.AES.encrypt(fullMessage, currentSeed).toString();

        input.value = ''; // Очищаем сразу для удобства

        try {
            const getResp = await fetch(`https://api.github.com/gists/${GIST_ID}`);
            const getData = await getResp.json();
            const oldContent = getData.files[FILE_NAME].content;
            const newContent = oldContent + (oldContent ? '\n' : '') + encrypted;

            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    files: { [FILE_NAME]: { content: newContent } }
                })
            });
            loadMessages();
        } catch (err) {
            alert("Ошибка сети");
        }
    }
</script>

</body>
</html>
