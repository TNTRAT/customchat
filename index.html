<!doctype html>
<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ghost chat</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FFD700; --bg: #1a1a1a; --bg-card: #2a2a2a;
            --text: #e0e0e0; --text-light: #9e9e9e; --border: #3a3a3a;
            --error: #ff4444; --success: #10b981;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); 
            height: 100vh; height: 100dvh; display: flex; justify-content: center; align-items: center;
            padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; overflow: hidden;
        }
        .container { 
            display: flex; width: 100%; max-width: 950px; 
            height: 100vh; height: 100dvh;
            background: var(--bg-card); overflow: hidden; position: relative; border-radius: 0;
            padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
        }
        .sidebar { 
            width: 260px; background: var(--bg-card); padding: 8px; 
            display: flex; flex-direction: column; border-right: 1px solid var(--border);
            overflow: hidden; flex-shrink: 0; transition: transform 0.3s ease; z-index: 30;

        .sidebar h3 { color: var(--primary); font-size: 0.75rem; margin-bottom: 5px; text-align: center; flex-shrink: 0; }
        .sidebar-section { margin-bottom: 5px; }
        .sidebar-section-title {
            font-size: 0.6rem; color: var(--text-light); text-transform: uppercase;
            letter-spacing: 0.5px; margin-bottom: 2px; padding-bottom: 2px;
            border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
        }
        .sidebar-section-title button {
            background: rgba(255,255,255,0.1); border: none; color: var(--primary);
            cursor: pointer; font-size: 0.6rem; padding: 1px 4px; border-radius: 3px;
        }
        .chat-list, .user-list { display: flex; flex-direction: column; gap: 1px; }
        .sidebar-scroll { flex: 1; overflow-y: auto; }
        .chat-item { 
            display: flex; align-items: center; gap: 5px; padding: 6px 7px; 
            border-radius: 7px; background: rgba(0,0,0,0.25); font-size: 0.73rem;
            cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
        }
        .chat-item.active { background: rgba(255,215,0,0.12); border: 1px solid rgba(255,215,0,0.35); }
        .chat-item-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; flex-shrink: 0; background: rgba(255,255,255,0.08); }
        .chat-item-content { flex: 1; min-width: 0; }
        .chat-item-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item-meta { font-size: 0.55rem; color: var(--text-light); margin-top: 1px; display: flex; gap: 3px; align-items: center; }
        .chat-item-badge { font-size: 0.48rem; padding: 1px 4px; border-radius: 5px; background: rgba(0,0,0,0.5); color: var(--primary); border: 1px solid rgba(255,215,0,0.4); font-weight: 600; }
        .chat-item-actions { display: flex; gap: 1px; flex-shrink: 0; }
        .chat-item-btn { background: rgba(255,255,255,0.08); border: none; border-radius: 3px; cursor: pointer; font-size: 0.55rem; padding: 2px 4px; color: var(--text-light); }
        .chat-item-btn.delete:hover { background: rgba(255,68,68,0.3); color: var(--error); }
        .user-item { 
            display: flex; align-items: center; gap: 3px; padding: 3px 5px; 
            border-radius: 5px; background: rgba(0,0,0,0.3); flex-wrap: wrap; font-size: 0.68rem;
            cursor: pointer; position: relative;
        }
        .user-item.active-chat { background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.3); }
        .user-item.banned-highlight { background: rgba(255,68,68,0.15); }
        .user-item.has-unread { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,215,0,0.4); } 50% { box-shadow: 0 0 0 2px rgba(255,215,0,0); } }
        .user-name { flex: 1; min-width: 40px; word-break: break-all; }
        .online-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
        .online-dot.offline { background: var(--border); }

        .user-badge { font-size: 0.48rem; padding: 1px 2px; border-radius: 4px; }
        .user-badge.admin { background: var(--primary); color: #1a1a1a; }
        .sidebar-logout { flex-shrink: 0; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }
        .sidebar-logout-btn { width: 100%; padding: 7px 10px; border: none; border-radius: 7px; background: rgba(255,68,68,0.15); color: var(--error); font-size: 0.72rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: all 0.2s; }
        .sidebar-logout-btn:hover { background: rgba(255,68,68,0.3); }
        .menu-toggle { display: none; position: absolute; top: 4px; left: 4px; z-index: 40; background: rgba(255,255,255,0.1); border: none; color: var(--text); padding: 4px 6px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 25; }
        .sidebar-overlay.active { display: block; }
        .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
        header { text-align: center; padding: 4px 8px; border-bottom: 1px solid var(--border); position: relative; flex-shrink: 0; }
        header h1 { color: var(--primary); font-size: 0.85rem; font-weight: 600; }

        .chat-type-badge { font-size: 0.45rem; padding: 1px 3px; border-radius: 4px; background: rgba(255,215,0,0.2); color: var(--primary); }
        .admin-badge { position: absolute; top: 4px; right: 6px; background: var(--primary); color: #1a1a1a; padding: 1px 5px; border-radius: 6px; font-size: 0.5rem; font-weight: 600; }
        .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        .message-content { font-size: 0.73rem; }
        .reply-preview { background: rgba(0,0,0,0.3); padding: 3px 5px; border-radius: 6px; margin-bottom: 3px; border-left: 2px solid var(--primary); font-size: 0.6rem; opacity: 0.8; }
        .reply-sender { color: var(--primary); margin-bottom: 1px; font-weight: 600; }
        .new-messages-indicator { position: absolute; bottom: 44px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #1a1a1a; padding: 4px 10px; border-radius: 16px; font-size: 0.65rem; font-weight: 600; cursor: pointer; z-index: 5; box-shadow: 0 2px 6px rgba(0,0,0,0.5); display: none; }
        .context-menu { position: fixed; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 3px; min-width: 130px; z-index: 1000; box-shadow: 0 4px 16px rgba(0,0,0,0.5); animation: menuFadeIn 0.15s ease; }
        @keyframes menuFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .context-menu-item { display: flex; align-items: center; gap: 6px; padding: 7px 9px; border-radius: 7px; cursor: pointer; font-size: 0.7rem; color: var(--text); transition: background 0.15s; white-space: nowrap; }
        .context-menu-item:hover { background: rgba(255,255,255,0.08); }
        .context-menu-item.delete-item { color: var(--error); }
        .context-menu-icon { font-size: 0.75rem; width: 14px; text-align: center; }
        .message-actions { position: absolute; top: 3px; right: 3px; display: flex; gap: 1px; opacity: 0; }
        .action-btn { background: rgba(0,0,0,0.3); border: none; border-radius: 50%; width: 16px; height: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 8px; color: white; }
        .action-btn.delete { color: #ff6b6b; }
        @media (hover: hover) and (pointer: fine) { .message:hover .message-actions { opacity: 1; } .message { cursor: default; } }
        @media (hover: none) and (pointer: coarse) { .message-actions { display: none; } .message { cursor: pointer; } }
        .auth-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 10; }
        .auth-box { background: var(--bg-card); padding: 18px; border-radius: 14px; width: 240px; text-align: center; border: 1px solid var(--border); }
        .auth-box h2 { color: var(--primary); margin-bottom: 12px; font-size: 1.1rem; }
        .auth-box input { width: 100%; padding: 8px; margin-bottom: 6px; border: 1px solid var(--border); border-radius: 8px; background: #1a1a1a; color: var(--text); font-size: 0.8rem; outline: none; }
        .auth-box input:focus { border-color: var(--primary); }
        .auth-buttons { display: flex; flex-direction: column; gap: 4px; margin-top: 2px; }
        .auth-box button { width: 100%; padding: 8px; border: none; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; background: var(--primary); color: #1a1a1a; }
        .auth-error { color: var(--error); font-size: 0.65rem; margin-top: 5px; min-height: 14px; }
        .input-area { padding: 5px 6px; border-top: 1px solid var(--border); background: var(--bg-card); flex-shrink: 0; }
        .typing-indicator { font-size: 0.58rem; color: var(--text-light); font-style: italic; min-height: 12px; margin-bottom: 2px; padding-left: 2px; }
        .input-row { display: flex; gap: 4px; }
        .input-area input { flex: 1; padding: 6px 9px; border: 1px solid var(--border); border-radius: 16px; font-size: 0.73rem; background: var(--bg); color: var(--text); outline: none; }
        .input-area input:focus { border-color: var(--primary); }
        .send-button { padding: 6px 12px; background: var(--primary); color: #1a1a1a; border: none; border-radius: 16px; font-size: 0.73rem; font-weight: 600; cursor: pointer; min-width: 36px; display: flex; align-items: center; justify-content: center; }
        .send-button:disabled { background: var(--border); cursor: not-allowed; opacity: 0.5; }
        .send-arrow { font-size: 0.85rem; line-height: 1; }
        .reply-indicator { font-size: 0.6rem; color: var(--primary); margin-bottom: 3px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,215,0,0.1); padding: 2px 5px; border-radius: 6px; }
        .reply-close { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 0.7rem; }
        .status { color: var(--primary); font-size: 0.55rem; text-align: center; margin-top: 2px; min-height: 10px; }
        .hide { display: none !important; }
        .empty-state { text-align: center; padding: 16px; color: var(--text-light); font-size: 0.7rem; }
        .no-items { text-align: center; color: var(--text-light); font-size: 0.55rem; padding: 3px; opacity: 0.6; }
        .ban-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 20; }
        .ban-message { background: var(--bg-card); padding: 18px; border-radius: 14px; text-align: center; border: 1px solid var(--border); }
        .ban-message h2 { color: var(--error); font-size: 1.1rem; margin-bottom: 5px; }
        .ban-message p { color: var(--text-light); margin-bottom: 12px; font-size: 0.73rem; }
        .ban-message button { padding: 6px 16px; background: var(--primary); color: #1a1a1a; border: none; border-radius: 8px; font-size: 0.73rem; font-weight: 600; cursor: pointer; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: var(--bg-card); padding: 16px; border-radius: 14px; border: 1px solid var(--border); text-align: center; max-width: 280px; width: 85%; }
        .modal-box h3 { color: var(--text); margin-bottom: 5px; font-size: 0.8rem; }
        .modal-box p { color: var(--text-light); font-size: 0.68rem; margin-bottom: 8px; }
        .modal-box input, .modal-box select { width: 100%; padding: 6px; margin-bottom: 6px; border: 1px solid var(--border); border-radius: 7px; background: var(--bg); color: var(--text); font-size: 0.72rem; outline: none; }
        .modal-box input:focus, .modal-box select:focus { border-color: var(--primary); }
        .modal-box select option { background: var(--bg-card); color: var(--text); }
        .modal-buttons { display: flex; gap: 6px; justify-content: center; }
        .modal-buttons button { padding: 6px 14px; border: none; border-radius: 8px; font-size: 0.72rem; font-weight: 600; cursor: pointer; }
        .modal-btn-cancel { background: var(--border); color: var(--text); }
        .modal-btn-confirm { background: var(--primary); color: #1a1a1a; }
        .modal-btn-danger { background: var(--error); color: white; }
        @media (max-width: 768px) {
            .container { border-radius: 0; max-width: 100%; height: 100vh; height: 100dvh; }
            .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 270px; transform: translateX(-100%); border-radius: 0 10px 10px 0; box-shadow: 4px 0 16px rgba(0,0,0,0.5); padding-top: calc(var(--safe-top) + 8px); padding-bottom: calc(var(--safe-bottom) + 8px); }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: block; top: calc(var(--safe-top) + 4px); }
            header { padding-left: 32px; }
            .auth-box { width: 85%; max-width: 240px; }
            .main-content { padding-top: var(--safe-top); }
        }
    </style>
</head>

        function tglSd() { const s = document.getElementById('mainSidebar'), o = document.getElementById('sidebarOverlay'); if (s.classList.contains('open')) { s.classList.remove('open'); o.classList.remove('active'); } else { s.classList.add('open'); o.classList.add('active'); } }
