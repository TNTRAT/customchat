<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost chat</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FFD700;
            --bg: #1a1a1a;
            --bg-card: #2a2a2a;
            --text: #e0e0e0;
            --text-light: #9e9e9e;
            --border: #3a3a3a;
            --error: #ff4444;
            --success: #10b981;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 10px; 
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }
        .container { 
            display: flex; 
            width: 100%; 
            max-width: 900px; 
            min-width: 320px; 
            height: 90vh; 
            max-height: 700px;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
        }
        .sidebar { 
            width: 240px; 
            background: var(--bg-card); 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            border-right: 1px solid var(--border);
            overflow: hidden;
        }
        .sidebar h3 { 
            color: var(--primary); 
            font-size: 0.95rem; 
            margin-bottom: 12px; 
            text-align: center; 
            flex-shrink: 0;
        }
        .sidebar-section {
            margin-bottom: 15px;
        }
        .sidebar-section-title {
            font-size: 0.75rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }
        .user-list { 
            display: flex; 
            flex-direction: column; 
            gap: 4px; 
            margin-bottom: 10px;
        }
        .sidebar-scroll {
            flex: 1;
            overflow-y: auto;
        }
        .user-item { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            padding: 8px; 
            border-radius: 12px; 
            background: rgba(0,0,0,0.3);
            flex-wrap: wrap;
            font-size: 0.85rem;
        }
        .user-item.banned-user {
            opacity: 0.6;
            background: rgba(255,68,68,0.1);
            border: 1px solid rgba(255,68,68,0.2);
        }
        .user-name { flex: 1; min-width: 60px; word-break: break-all; }
        .user-badge { 
            font-size: 0.65rem; 
            padding: 2px 6px; 
            border-radius: 12px; 
        }
        .user-badge.admin { background: var(--primary); color: #1a1a1a; }
        .user-badge.banned { background: var(--error); color: white; }
        .user-actions { display: flex; gap: 4px; flex-wrap: wrap; }
        .user-action-btn { 
            background: rgba(255,255,255,0.1); 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 0.85rem; 
            padding: 4px 8px; 
            color: var(--text);
            transition: all 0.2s;
        }
        .user-action-btn:hover { background: rgba(255,255,255,0.25); }
        .user-action-btn.delete-btn {
            color: var(--error);
        }
        .user-action-btn.delete-btn:hover {
            background: rgba(255,68,68,0.3);
        }
        .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
        header { 
            text-align: center; 
            padding: 12px; 
            border-bottom: 1px solid var(--border);
            position: relative;
            flex-shrink: 0;
        }
        header h1 { color: var(--primary); font-size: 1.3rem; font-weight: 600; }
        .admin-badge { 
            position: absolute; 
            top: 12px; 
            right: 12px; 
            background: var(--primary); 
            color: #1a1a1a; 
            padding: 3px 10px; 
            border-radius: 14px; 
            font-size: 0.7rem; 
            font-weight: 600; 
        }
        .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .messages { 
            flex: 1; 
            padding: 15px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }
        .message { 
            display: flex; 
            flex-direction: column; 
            max-width: 85%; 
            padding: 8px 12px; 
            border-radius: 18px; 
            line-height: 1.4; 
            animation: fadeIn 0.2s ease; 
            position: relative; 
            word-wrap: break-word;
            cursor: pointer;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { 
            align-self: flex-end; 
            background: var(--primary); 
            color: #1a1a1a; 
            border-bottom-right-radius: 6px; 
        }
        .message.other { 
            align-self: flex-start; 
            background: rgba(255,255,255,0.08); 
            color: var(--text); 
            border-bottom-left-radius: 6px; 
        }
        .message:active {
            opacity: 0.8;
        }
        .message-info { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 4px; 
            gap: 10px;
        }
        .sender { font-weight: 600; font-size: 0.75rem; opacity: 0.8; }
        .time { font-size: 0.65rem; opacity: 0.5; white-space: nowrap; }
        .message-content { font-size: 0.9rem; }
        .reply-preview { 
            background: rgba(0,0,0,0.3); 
            padding: 6px 8px; 
            border-radius: 10px; 
            margin-bottom: 6px; 
            border-left: 3px solid var(--primary); 
            font-size: 0.75rem;
            opacity: 0.8;
        }
        .reply-sender { color: var(--primary); margin-bottom: 2px; font-weight: 600; }
        
        /* Контекстное меню */
        .context-menu {
            position: fixed;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 6px;
            min-width: 150px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            animation: menuFadeIn 0.15s ease;
        }
        @keyframes menuFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .context-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text);
            transition: background 0.15s;
            white-space: nowrap;
        }
        .context-menu-item:hover {
            background: rgba(255,255,255,0.08);
        }
        .context-menu-item:active {
            background: rgba(255,255,255,0.15);
        }
        .context-menu-item.delete-item {
            color: var(--error);
        }
        .context-menu-icon {
            font-size: 1rem;
            width: 20px;
            text-align: center;
        }

        /* Десктопные кнопки действий */
        .message-actions { 
            position: absolute; 
            top: 6px; 
            right: 6px; 
            display: flex; 
            gap: 3px; 
            opacity: 0; 
            transition: opacity 0.2s; 
        }
        .action-btn { 
            background: rgba(0,0,0,0.3); 
            border: none; 
            border-radius: 50%; 
            width: 22px; 
            height: 22px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 11px; 
            color: white;
        }
        .action-btn:hover { background: rgba(0,0,0,0.5); }
        .action-btn.delete { color: #ff6b6b; }

        @media (hover: hover) and (pointer: fine) {
            .message:hover .message-actions { opacity: 1; }
            .message { cursor: default; }
        }

        @media (hover: none) and (pointer: coarse) {
            .message-actions { display: none; }
            .message { cursor: pointer; }
        }
        
        /* Форма входа */
        .auth-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 10;
        }
        .auth-box {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            width: 300px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .auth-box h2 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        .auth-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: #1a1a1a;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }
        .auth-box input:focus {
            border-color: var(--primary);
        }
        .auth-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 5px;
        }
        .auth-box button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--primary);
            color: #1a1a1a;
        }
        .auth-box button:hover { 
            opacity: 0.9; 
            transform: translateY(-1px);
        }
        .auth-box button:active {
            transform: translateY(0);
        }
        .auth-error {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 10px;
            min-height: 20px;
        }

        .input-area { 
            padding: 12px; 
            border-top: 1px solid var(--border); 
            background: var(--bg-card);
            flex-shrink: 0;
        }
        .input-row { display: flex; gap: 8px; }
        .input-area input { 
            flex: 1; 
            padding: 10px 14px; 
            border: 1px solid var(--border); 
            border-radius: 22px; 
            font-size: 0.9rem; 
            background: var(--bg); 
            color: var(--text); 
            outline: none; 
        }
        .input-area input:focus { border-color: var(--primary); }
        .send-button { 
            padding: 10px 20px; 
            background: var(--primary); 
            color: #1a1a1a; 
            border: none; 
            border-radius: 22px; 
            font-size: 0.9rem; 
            font-weight: 600; 
            cursor: pointer; 
            min-width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .send-button:disabled { 
            background: var(--border); 
            cursor: not-allowed; 
            opacity: 0.5; 
        }
        .send-arrow {
            font-size: 1.2rem;
            line-height: 1;
        }
        .reply-indicator { 
            font-size: 0.8rem; 
            color: var(--primary); 
            margin-bottom: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(255,215,0,0.1); 
            padding: 6px 10px; 
            border-radius: 12px; 
        }
        .reply-close { 
            background: none; 
            border: none; 
            color: var(--primary); 
            cursor: pointer; 
            font-size: 1.1rem; 
            padding: 0 4px; 
        }
        .status { 
            color: var(--primary); 
            font-size: 0.75rem; 
            text-align: center; 
            margin-top: 6px;
            min-height: 18px;
            transition: all 0.3s;
        }
        .hide { display: none !important; }
        .empty-state { 
            text-align: center; 
            padding: 30px; 
            color: var(--text-light); 
            font-size: 0.9rem;
        }
        .logout-btn {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text);
            padding: 4px 12px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .logout-btn:hover { background: rgba(255,68,68,0.3); }

        .no-users {
            text-align: center;
            color: var(--text-light);
            font-size: 0.75rem;
            padding: 10px;
            opacity: 0.6;
        }

        /* Бан-оверлей */
        .ban-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .ban-message {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .ban-message h2 {
            color: var(--error);
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        .ban-message p {
            color: var(--text-light);
            margin-bottom: 20px;
        }
        .ban-message button {
            padding: 10px 24px;
            background: var(--primary);
            color: #1a1a1a;
            border: none;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Модальное окно подтверждения */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-box {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }
        .modal-box h3 {
            color: var(--text);
            margin-bottom: 10px;
        }
        .modal-box p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .modal-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }
        .modal-btn-cancel {
            background: var(--border);
            color: var(--text);
        }
        .modal-btn-confirm {
            background: var(--error);
            color: white;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .container { max-width: 100%; border-radius: 0; }
            .auth-box { width: 90%; max-width: 300px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Сайдбар администратора -->
        <div class="sidebar hide" id="adminSidebar">
            <h3>Управление пользователями</h3>
            <div class="sidebar-scroll">
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Активные</div>
                    <div class="user-list" id="activeUsersList"></div>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Забаненные</div>
                    <div class="user-list" id="bannedUsersList"></div>
                </div>
            </div>
        </div>

        <!-- Основной контент -->
        <div class="main-content">
            <!-- Бан-оверлей -->
            <div class="ban-overlay hide" id="banOverlay">
                <div class="ban-message">
                    <h2>Вы забанены</h2>
                    <p>Ваш аккаунт был заблокирован администратором.</p>
                    <button onclick="logout()">Выйти</button>
                </div>
            </div>

            <!-- Модальное окно подтверждения -->
            <div class="modal-overlay hide" id="confirmModal">
                <div class="modal-box">
                    <h3 id="modalTitle">Подтверждение</h3>
                    <p id="modalText"></p>
                    <div class="modal-buttons">
                        <button class="modal-btn-cancel" onclick="closeModal()">Отмена</button>
                        <button class="modal-btn-confirm" id="modalConfirmBtn">Удалить</button>
                    </div>
                </div>
            </div>

            <!-- Контекстное меню -->
            <div class="context-menu hide" id="contextMenu">
                <div class="context-menu-item" id="menuReply" onclick="contextReply()">
                    <span class="context-menu-icon">&#8617;</span>
                    <span>Ответить</span>
                </div>
                <div class="context-menu-item delete-item" id="menuDelete" onclick="contextDelete()">
                    <span class="context-menu-icon">&#10005;</span>
                    <span>Удалить</span>
                </div>
            </div>

            <!-- Форма входа -->
            <div class="auth-overlay" id="authOverlay">
                <div class="auth-box">
                    <h2>Ghost Chat</h2>
                    <input type="text" id="nameInput" placeholder="Имя пользователя" autocomplete="off">
                    <input type="password" id="passwordInput" placeholder="Пароль" autocomplete="off">
                    <div class="auth-buttons">
                        <button id="loginBtn">Войти</button>
                        <button id="registerBtn">Зарегистрироваться</button>
                    </div>
                    <div class="auth-error" id="authError"></div>
                </div>
            </div>

            <!-- Заголовок чата -->
            <header>
                <button class="logout-btn hide" id="logoutBtn" onclick="logout()">Выйти</button>
                <h1>Ghost chat</h1>
                <span id="adminBadge" class="admin-badge hide">Администратор</span>
            </header>

            <!-- Область чата -->
            <div class="chat-container">
                <div class="messages" id="messages">
                    <div class="empty-state">Войдите в аккаунт</div>
                </div>

                <!-- Поле ввода -->
                <div class="input-area hide" id="inputArea">
                    <div id="replyIndicator" class="reply-indicator hide">
                        <span id="replyText"></span>
                        <button class="reply-close" onclick="clearReply()">x</button>
                    </div>
                    <div class="input-row">
                        <input type="text" id="messageInput" placeholder="Написать сообщение..." autocomplete="off">
                        <button id="sendButton" class="send-button" disabled>
                            <span class="send-arrow">&#10148;</span>
                        </button>
                    </div>
                    <div class="status" id="status"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Firebase инициализация
        const firebaseConfig = {
            apiKey: "AIzaSyCF2izLpJOUc90hF2hpnhVLJm4bgmD6xyE",
            authDomain: "database-5cf6d.firebaseapp.com",
            databaseURL: "https://database-5cf6d-default-rtdb.firebaseio.com",
            projectId: "database-5cf6d",
            storageBucket: "database-5cf6d.firebasestorage.app",
            messagingSenderId: "1081787251376",
            appId: "1:1081787251376:web:a4c7847df3956923221975"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const messagesRef = database.ref('messages');
        const usersRef = database.ref('users');
        const bannedUsersRef = database.ref('bannedUsers');

        // DOM элементы
        const authOverlay = document.getElementById('authOverlay');
        const banOverlay = document.getElementById('banOverlay');
        const confirmModal = document.getElementById('confirmModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalText = document.getElementById('modalText');
        const modalConfirmBtn = document.getElementById('modalConfirmBtn');
        const contextMenu = document.getElementById('contextMenu');
        const menuReply = document.getElementById('menuReply');
        const menuDelete = document.getElementById('menuDelete');
        const nameInput = document.getElementById('nameInput');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const authError = document.getElementById('authError');
        const logoutBtn = document.getElementById('logoutBtn');
        const adminSidebar = document.getElementById('adminSidebar');
        const activeUsersList = document.getElementById('activeUsersList');
        const bannedUsersList = document.getElementById('bannedUsersList');
        const adminBadge = document.getElementById('adminBadge');
        const messagesEl = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const inputArea = document.getElementById('inputArea');
        const statusEl = document.getElementById('status');
        const replyIndicator = document.getElementById('replyIndicator');
        const replyText = document.getElementById('replyText');

        // Состояние
        let currentUser = null;
        let currentUserName = '';
        let isAdmin = false;
        let autoScroll = true;
        let replyTo = null;
        let bannedUsers = {};
        let allUsers = {};
        let statusTimeout = null;
        let messagesListener = null;
        let usersListener = null;
        let bansListener = null;
        let pendingModalAction = null;
        let contextMessageId = null;
        let contextMessageSender = null;
        let contextMessageText = null;

        // Хеширование пароля
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Контекстное меню
        function showContextMenu(e, messageId, sender, text) {
            e.preventDefault();
            e.stopPropagation();
            
            contextMessageId = messageId;
            contextMessageSender = sender;
            contextMessageText = text;

            const isMe = sender === currentUser;
            const canDelete = isMe || isAdmin;
            
            menuReply.classList.remove('hide');
            
            if (canDelete) {
                menuDelete.classList.remove('hide');
            } else {
                menuDelete.classList.add('hide');
            }

            let x = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
            let y = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);

            if (e.touches && e.touches[0]) {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
            }

            const menuWidth = 150;
            const menuHeight = canDelete ? 80 : 40;

            if (x + menuWidth > window.innerWidth) {
                x = window.innerWidth - menuWidth - 10;
            }
            if (y + menuHeight > window.innerHeight) {
                y = window.innerHeight - menuHeight - 10;
            }
            if (x < 10) x = 10;
            if (y < 10) y = 10;

            contextMenu.style.left = x + 'px';
            contextMenu.style.top = y + 'px';
            contextMenu.classList.remove('hide');
        }

        function hideContextMenu() {
            contextMenu.classList.add('hide');
            contextMessageId = null;
            contextMessageSender = null;
            contextMessageText = null;
        }

        function contextReply() {
            if (contextMessageId && contextMessageSender) {
                setReplyTo(contextMessageId, contextMessageSender, contextMessageText || '');
            }
            hideContextMenu();
        }

        function contextDelete() {
            if (contextMessageId) {
                deleteMessage(contextMessageId);
            }
            hideContextMenu();
        }

        document.addEventListener('click', (e) => {
            if (!contextMenu.contains(e.target)) {
                hideContextMenu();
            }
        });

        document.addEventListener('touchstart', (e) => {
            if (!contextMenu.contains(e.target)) {
                hideContextMenu();
            }
        });

        // Модальное окно
        function showModal(title, text, confirmText, onConfirm) {
            modalTitle.textContent = title;
            modalText.textContent = text;
            modalConfirmBtn.textContent = confirmText;
            pendingModalAction = onConfirm;
            confirmModal.classList.remove('hide');
        }

        function closeModal() {
            confirmModal.classList.add('hide');
            pendingModalAction = null;
        }

        modalConfirmBtn.addEventListener('click', () => {
            if (pendingModalAction) {
                pendingModalAction();
                closeModal();
            }
        });

        confirmModal.addEventListener('click', (e) => {
            if (e.target === confirmModal) {
                closeModal();
            }
        });

        // Отслеживание банов в реальном времени
        function startListeningBans() {
            if (bansListener) {
                bannedUsersRef.off('value', bansListener);
            }
            
            bansListener = (snapshot) => {
                bannedUsers = snapshot.val() || {};
                
                if (currentUser && bannedUsers[currentUser]) {
                    showBanScreen();
                }
                
                if (isAdmin) {
                    renderUserList();
                }
                
                if (messagesListener) {
                    refreshMessagesDisplay();
                }
            };
            
            bannedUsersRef.on('value', bansListener);
        }

        // Отслеживание пользователей в реальном времени
        function startListeningUsers() {
            if (usersListener) {
                usersRef.off('value', usersListener);
            }
            
            usersListener = (snapshot) => {
                allUsers = snapshot.val() || {};
                
                if (currentUser && allUsers[currentUser] && currentUser !== 'tntrat') {
                    const newAdminStatus = allUsers[currentUser].isAdmin || false;
                    if (newAdminStatus !== isAdmin) {
                        isAdmin = newAdminStatus;
                        if (isAdmin) {
                            adminSidebar.classList.remove('hide');
                            adminBadge.classList.remove('hide');
                            renderUserList();
                            setStatus('Вы назначены администратором');
                        } else {
                            adminSidebar.classList.add('hide');
                            adminBadge.classList.add('hide');
                            setStatus('Вы лишены прав администратора');
                        }
                    }
                }
                
                if (isAdmin) {
                    renderUserList();
                }
            };
            
            usersRef.on('value', usersListener);
        }

        function showBanScreen() {
            banOverlay.classList.remove('hide');
            inputArea.classList.add('hide');
            adminSidebar.classList.add('hide');
            adminBadge.classList.add('hide');
            logoutBtn.classList.add('hide');
            authOverlay.classList.add('hide');
        }

        function renderUserList() {
            if (!isAdmin) return;

            const usersArray = Object.entries(allUsers).sort(([a], [b]) => a.localeCompare(b));
            
            const activeUsers = usersArray.filter(([username]) => !bannedUsers[username]);
            const bannedUsersArray = usersArray.filter(([username]) => bannedUsers[username]);

            activeUsersList.innerHTML = activeUsers.length > 0 
                ? activeUsers.map(([username, userData]) => renderUserItem(username, userData, false)).join('')
                : '<div class="no-users">Нет активных пользователей</div>';

            bannedUsersList.innerHTML = bannedUsersArray.length > 0
                ? bannedUsersArray.map(([username, userData]) => renderUserItem(username, userData, true)).join('')
                : '<div class="no-users">Нет забаненных пользователей</div>';
        }

        function renderUserItem(username, userData, isBanned) {
            const isUserAdmin = userData.isAdmin || false;
            const isProtected = username === 'tntrat';
            const isMe = username === currentUser;

            let actionsHtml = '';
            if (!isProtected) {
                if (!isMe) {
                    if (isUserAdmin) {
                        actionsHtml += `<button class="user-action-btn" onclick="toggleAdmin('${username}')" title="Снять права администратора" style="color: var(--primary);">&#128081;</button>`;
                    } else {
                        actionsHtml += `<button class="user-action-btn" onclick="toggleAdmin('${username}')" title="Назначить администратором">&#128081;</button>`;
                    }
                } else {
                    if (isUserAdmin) {
                        actionsHtml += `<span style="color: var(--primary); font-size: 0.85rem; opacity: 0.5;" title="Нельзя изменить свои права">&#128081;</span>`;
                    }
                }
                
                if (!isMe) {
                    if (isBanned) {
                        actionsHtml += `<button class="user-action-btn" onclick="toggleBanUser('${username}')" title="Разбанить" style="color: var(--success);">&#8634;</button>`;
                    } else {
                        actionsHtml += `<button class="user-action-btn" onclick="toggleBanUser('${username}')" title="Забанить" style="color: var(--error);">&#128683;</button>`;
                    }
                }
                
                if (isBanned && !isMe && currentUser === 'tntrat') {
                    actionsHtml += `<button class="user-action-btn delete-btn" onclick="deleteUser('${username}')" title="Удалить аккаунт">&#10005;</button>`;
                }
            } else {
                actionsHtml = '<span style="font-size:0.65rem;color:var(--primary);opacity:0.7">создатель</span>';
            }

            return `
                <div class="user-item ${isBanned ? 'banned-user' : ''}">
                    <span class="user-name">${escapeHtml(username)}${isMe ? ' (вы)' : ''}</span>
                    ${isUserAdmin ? '<span class="user-badge admin">&#128081;</span>' : ''}
                    ${isBanned ? '<span class="user-badge banned">бан</span>' : ''}
                    <div class="user-actions">${actionsHtml}</div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(timestamp) {
            const now = new Date();
            const msgDate = new Date(timestamp);
            const diff = now - msgDate;
            if (diff < 60000) return 'сейчас';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}м`;
            if (diff < 86400000) return msgDate.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            return msgDate.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        }

        function setStatus(text, duration = 4000) {
            statusEl.textContent = text;
            if (statusTimeout) clearTimeout(statusTimeout);
            if (text && duration > 0) {
                statusTimeout = setTimeout(() => {
                    if (statusEl.textContent === text) statusEl.textContent = '';
                }, duration);
            }
        }

        function showAuthError(text) {
            authError.textContent = text;
            if (text) {
                setTimeout(() => {
                    if (authError.textContent === text) authError.textContent = '';
                }, 4000);
            }
        }

        function updateSendButton() {
            sendButton.disabled = !messageInput.value.trim();
        }

        function setReplyTo(id, sender, text) {
            replyTo = { id, sender, text };
            replyText.textContent = `&#8617; Ответ для ${escapeHtml(sender)}: ${text.substring(0, 40)}${text.length > 40 ? '...' : ''}`;
            replyIndicator.classList.remove('hide');
            messageInput.focus();
        }

        function clearReply() {
            replyTo = null;
            replyIndicator.classList.add('hide');
            replyText.textContent = '';
        }

        async function toggleAdmin(username) {
            if (!isAdmin) return;
            if (username === 'tntrat') {
                setStatus('Невозможно изменить права создателя');
                return;
            }
            if (username === currentUser) {
                setStatus('Невозможно изменить свои права');
                return;
            }

            try {
                const userData = allUsers[username];
                if (!userData) {
                    setStatus('Пользователь не найден');
                    return;
                }

                const newStatus = !userData.isAdmin;
                await usersRef.child(username).update({ isAdmin: newStatus });
                setStatus(`Пользователь ${username} ${newStatus ? 'назначен администратором' : 'лишён прав администратора'}`);
            } catch (error) {
                console.error(error);
                setStatus('Ошибка при изменении прав');
            }
        }

        async function toggleBanUser(username) {
            if (!isAdmin) return;
            if (username === currentUser) {
                setStatus('Невозможно забанить самого себя');
                return;
            }
            if (username === 'tntrat') {
                setStatus('Невозможно забанить создателя');
                return;
            }

            try {
                const isBanned = !!bannedUsers[username];
                
                if (isBanned) {
                    await bannedUsersRef.child(username).remove();
                } else {
                    await bannedUsersRef.child(username).set(true);
                }

                setStatus(`Пользователь ${username} ${isBanned ? 'разбанен' : 'забанен'}`);
            } catch (error) {
                console.error(error);
                setStatus('Ошибка при бане');
            }
        }

        async function deleteUser(username) {
            if (!isAdmin) return;
            if (currentUser !== 'tntrat') {
                setStatus('Только создатель может удалять аккаунты');
                return;
            }
            if (username === 'tntrat') {
                setStatus('Невозможно удалить создателя');
                return;
            }
            if (username === currentUser) {
                setStatus('Невозможно удалить самого себя');
                return;
            }

            showModal(
                'Удаление аккаунта',
                `Вы уверены, что хотите безвозвратно удалить аккаунт пользователя "${username}"? Все его сообщения будут удалены.`,
                'Удалить',
                async () => {
                    try {
                        await bannedUsersRef.child(username).remove();
                        await usersRef.child(username).remove();
                        
                        const messagesSnapshot = await messagesRef.once('value');
                        const messages = messagesSnapshot.val();
                        if (messages) {
                            const deletePromises = Object.entries(messages)
                                .filter(([_, msg]) => msg.sender === username)
                                .map(([key]) => messagesRef.child(key).remove());
                            await Promise.all(deletePromises);
                        }
                        
                        setStatus(`Аккаунт пользователя ${username} удалён`);
                    } catch (error) {
                        console.error(error);
                        setStatus('Ошибка при удалении аккаунта');
                    }
                }
            );
        }

        async function deleteMessage(id) {
            if (!currentUser) return;

            try {
                const snapshot = await messagesRef.child(id).once('value');
                const message = snapshot.val();
                if (!message) return;

                if (message.sender !== currentUser && !isAdmin) {
                    setStatus('Можно удалять только свои сообщения');
                    return;
                }

                await messagesRef.child(id).remove();
                setStatus('Сообщение удалено', 2000);
            } catch (error) {
                console.error(error);
                setStatus('Ошибка при удалении сообщения');
            }
        }

        async function refreshMessagesDisplay() {
            const snapshot = await messagesRef.once('value');
            const data = snapshot.val();
            let messages = data ? Object.entries(data).map(([key, value]) => ({ id: key, ...value }))
                .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp)) : [];

            messages = messages.filter(msg => !bannedUsers[msg.sender]);

            if (messages.length === 0) {
                messagesEl.innerHTML = '<div class="empty-state">Пока нет сообщений</div>';
                return;
            }

            const userNames = {};
            for (const msg of messages) {
                if (msg.sender && !userNames[msg.sender]) {
                    const snap = await usersRef.child(msg.sender).once('value');
                    const data = snap.val();
                    userNames[msg.sender] = data ? (data.name || msg.sender) : msg.sender;
                }
            }

            messagesEl.innerHTML = messages.map(msg => {
                const displayName = userNames[msg.sender] || msg.sender;
                const isMe = msg.sender === currentUser;

                let replyHtml = '';
                if (msg.replyTo && msg.replyTo.sender) {
                    const replyName = userNames[msg.replyTo.sender] || msg.replyTo.sender;
                    replyHtml = `
                        <div class="reply-preview">
                            <div class="reply-sender">&#8617; Ответ для ${escapeHtml(replyName)}</div>
                            <div>${escapeHtml(msg.replyTo.text || '')}</div>
                        </div>`;
                }

                const escapedText = escapeHtml(msg.text);
                const escapedSender = escapeHtml(displayName);
                const escapedMsgText = (msg.text || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');

                return `
                    <div class="message ${isMe ? 'user' : 'other'}" 
                         data-id="${msg.id}" 
                         data-sender="${msg.sender}" 
                         data-text="${escapedMsgText}"
                         onclick="handleMessageClick(event, '${msg.id}', '${msg.sender.replace(/'/g, "\\'")}', '${escapedMsgText.substring(0, 100)}')"
                         oncontextmenu="handleMessageContextMenu(event, '${msg.id}', '${msg.sender.replace(/'/g, "\\'")}', '${escapedMsgText.substring(0, 100)}')">
                        ${replyHtml}
                        <div class="message-info">
                            <span class="sender">${escapedSender}</span>
                            <span class="time">${formatTime(msg.timestamp)}</span>
                        </div>
                        <div class="message-content">${escapedText}</div>
                        <div class="message-actions">
                            <button class="action-btn" onclick="event.stopPropagation(); setReplyTo('${msg.id}', '${msg.sender.replace(/'/g, "\\'")}', '${escapedMsgText.substring(0, 50)}')" title="Ответить">&#8617;</button>
                            ${(isMe || isAdmin) ? `<button class="action-btn delete" onclick="event.stopPropagation(); deleteMessage('${msg.id}')" title="Удалить">x</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            if (autoScroll) {
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }
        }

        function handleMessageClick(e, id, sender, text) {
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                showContextMenu(e, id, sender, text);
            }
        }

        function handleMessageContextMenu(e, id, sender, text) {
            showContextMenu(e, id, sender, text);
        }

        function loadMessages() {
            if (messagesListener) {
                messagesRef.off('value', messagesListener);
            }

            messagesListener = (snapshot) => {
                refreshMessagesDisplay();
            };

            messagesRef.on('value', messagesListener);
        }

        async function login() {
            const name = nameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!name || !password) {
                showAuthError('Заполните все поля');
                return;
            }

            try {
                await loadBans();
                if (bannedUsers[name]) {
                    showAuthError('Этот аккаунт забанен');
                    return;
                }

                const snapshot = await usersRef.child(name).once('value');
                const userData = snapshot.val();

                if (!userData) {
                    showAuthError('Аккаунт не найден');
                    return;
                }

                const hashedPassword = await hashPassword(password);
                if (userData.password !== hashedPassword) {
                    showAuthError('Неверный пароль');
                    return;
                }

                currentUser = name;
                currentUserName = userData.name || name;
                isAdmin = userData.isAdmin || false;

                localStorage.setItem('chat_username', name);
                localStorage.setItem('chat_logged_in', 'true');

                showChat();
                loadMessages();
                setStatus(`Добро пожаловать, ${currentUserName}!`, 3000);
            } catch (error) {
                console.error(error);
                showAuthError('Ошибка при входе');
            }
        }

        async function loadBans() {
            const snapshot = await bannedUsersRef.once('value');
            bannedUsers = snapshot.val() || {};
        }

        async function register() {
            const name = nameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!name || !password) {
                showAuthError('Заполните все поля');
                return;
            }
            if (password.length < 4) {
                showAuthError('Пароль должен содержать минимум 4 символа');
                return;
            }
            if (name.length < 2) {
                showAuthError('Имя должно содержать минимум 2 символа');
                return;
            }

            try {
                const snapshot = await usersRef.child(name).once('value');
                if (snapshot.val()) {
                    showAuthError('Это имя уже занято');
                    return;
                }

                const hashedPassword = await hashPassword(password);
                const userData = {
                    name: name,
                    password: hashedPassword,
                    isAdmin: name === 'tntrat'
                };

                await usersRef.child(name).set(userData);

                currentUser = name;
                currentUserName = name;
                isAdmin = name === 'tntrat';

                localStorage.setItem('chat_username', name);
                localStorage.setItem('chat_logged_in', 'true');

                showChat();
                loadMessages();
                setStatus(`Аккаунт создан! Добро пожаловать, ${name}!`, 4000);
            } catch (error) {
                console.error(error);
                showAuthError('Ошибка при регистрации');
            }
        }

        function logout() {
            currentUser = null;
            currentUserName = '';
            isAdmin = false;
            replyTo = null;
            
            localStorage.removeItem('chat_logged_in');
            
            if (messagesListener) {
                messagesRef.off('value', messagesListener);
                messagesListener = null;
            }

            banOverlay.classList.add('hide');
            authOverlay.classList.remove('hide');
            inputArea.classList.add('hide');
            adminSidebar.classList.add('hide');
            adminBadge.classList.add('hide');
            logoutBtn.classList.add('hide');
            hideContextMenu();
            
            messagesEl.innerHTML = '<div class="empty-state">Войдите в аккаунт</div>';
            
            nameInput.value = localStorage.getItem('chat_username') || '';
            passwordInput.value = '';
            nameInput.focus();
        }

        function showChat() {
            authOverlay.classList.add('hide');
            inputArea.classList.remove('hide');
            logoutBtn.classList.remove('hide');
            
            if (isAdmin) {
                adminSidebar.classList.remove('hide');
                adminBadge.classList.remove('hide');
                renderUserList();
            }
            
            startListeningBans();
            startListeningUsers();
            
            messageInput.focus();
        }

        function sendMessage() {
            if (!currentUser) return;

            const text = messageInput.value.trim();
            if (!text) return;

            const messageData = {
                sender: currentUser,
                text: text,
                timestamp: new Date().toISOString()
            };

            if (replyTo) {
                messageData.replyTo = {
                    sender: replyTo.sender,
                    text: replyTo.text
                };
                clearReply();
            }

            messagesRef.push(messageData).catch(err => {
                console.error(err);
                setStatus('Ошибка при отправке сообщения');
            });

            messageInput.value = '';
            updateSendButton();
            messageInput.focus();
        }

        // Обработчики событий
        loginBtn.addEventListener('click', login);
        registerBtn.addEventListener('click', register);

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });

        nameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') passwordInput.focus();
        });

        sendButton.addEventListener('click', sendMessage);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        messageInput.addEventListener('input', updateSendButton);

        messagesEl.addEventListener('scroll', () => {
            autoScroll = messagesEl.scrollTop + messagesEl.clientHeight >= messagesEl.scrollHeight - 50;
        });

        // Глобальные функции
        window.setReplyTo = setReplyTo;
        window.clearReply = clearReply;
        window.deleteMessage = deleteMessage;
        window.toggleAdmin = toggleAdmin;
        window.toggleBanUser = toggleBanUser;
        window.deleteUser = deleteUser;
        window.logout = logout;
        window.closeModal = closeModal;
        window.handleMessageClick = handleMessageClick;
        window.handleMessageContextMenu = handleMessageContextMenu;

        // Инициализация
        window.addEventListener('load', async () => {
            await loadBans();
            
            const savedUser = localStorage.getItem('chat_username');
            const isLoggedIn = localStorage.getItem('chat_logged_in') === 'true';

            if (savedUser && isLoggedIn) {
                if (bannedUsers[savedUser]) {
                    localStorage.removeItem('chat_logged_in');
                    nameInput.value = savedUser;
                    return;
                }
                
                nameInput.value = savedUser;
                passwordInput.focus();
            }
        });

        // Защита создателя
        usersRef.child('tntrat').once('value').then(snapshot => {
            if (snapshot.exists() && !snapshot.val().isAdmin) {
                snapshot.ref.update({ isAdmin: true });
            }
        });
    </script>
</body>
</html>
