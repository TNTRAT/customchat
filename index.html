<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost chat</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FFD700;
            --bg: #1a1a1a;
            --bg-card: #2a2a2a;
            --text: #e0e0e0;
            --text-light: #9e9e9e;
            --border: #3a3a3a;
            --error: #ff4444;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; padding: 10px; }
        .container { width: 100%; max-width: 500px; min-width: 320px; padding: 15px; display: flex; flex-direction: column; height: 90vh; max-height: 700px; }
        header { text-align: center; padding: 15px 0; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        header h1 { color: var(--primary); font-size: 1.4rem; font-weight: 600; }
        .chat-container { flex: 1; display: flex; flex-direction: column; background: var(--bg-card); border-radius: 12px; overflow: hidden; }
        .messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; flex-direction: column; max-width: 85%; padding: 10px 14px; border-radius: 16px; line-height: 1.4; animation: fadeIn 0.2s ease; position: relative; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; background: var(--primary); color: #1a1a1a; border-bottom-right-radius: 4px; }
        .message.other { align-self: flex-start; background: var(--bg); color: var(--text); border-bottom-left-radius: 4px; }
        .message-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .sender { font-weight: 600; font-size: 0.8rem; }
        .time { font-size: 0.7rem; opacity: 0.6; }
        .message-content { font-size: 0.9rem; word-wrap: break-word; }
        .reply-preview { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid var(--primary); }
        .reply-sender { color: var(--primary); font-size: 0.8rem; margin-bottom: 4px; }
        .message-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; }
        .action-btn { background: rgba(255,255,255,0.2); border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .action-btn:hover { background: rgba(255,255,255,0.3); }
        .action-btn.delete { color: #ff4444; }
        .input-area, .auth-form { padding: 15px; border-top: 1px solid var(--border); background: var(--bg-card); display: flex; flex-direction: column; gap: 10px; }
        .input-row, .auth-row { display: flex; gap: 10px; align-items: flex-end; }
        .input-area input, .auth-form input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 20px; font-size: 0.9rem; background: var(--bg); color: var(--text); outline: none; }
        .input-area input:focus, .auth-form input:focus { border-color: var(--primary); }
        .input-area button, .auth-form button { padding: 10px 20px; background: var(--primary); color: #1a1a1a; border: none; border-radius: 20px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
        .input-area button:disabled, .auth-form button:disabled { background: var(--border); cursor: not-allowed; opacity: 0.6; }
        .auth-btn { width: 100%; }
        .auth-btn.secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
        .empty-state { text-align: center; padding: 30px 15px; color: var(--text-light); }
        .status { color: var(--primary); font-size: 0.8rem; text-align: center; padding: 5px; }
        .error { color: var(--error); font-size: 0.8rem; text-align: center; padding: 5px; }
        .hide { display: none; }
        .reply-indicator { font-size: 0.8rem; color: var(--primary); margin-bottom: 5px; cursor: pointer; }
        .reply-indicator:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>Ghost chat</h1></header>
        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="empty-state"><h3>Войдите или зарегистрируйтесь</h3></div>
            </div>
            <div id="authArea" class="auth-form">
                <div class="auth-row">
                    <input type="text" id="nameInput" placeholder="Имя" autocomplete="off">
                </div>
                <div class="auth-row">
                    <input type="password" id="passwordInput" placeholder="Пароль" autocomplete="off">
                </div>
                <div class="auth-row">
                    <button id="loginBtn">Войти</button>
                </div>
                <div class="auth-row">
                    <button id="registerBtn" class="secondary">Зарегистрироваться</button>
                </div>
                <div class="error" id="error"></div>
            </div>
            <div id="inputArea" class="input-area hide">
                <div class="input-row">
                    <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off">
                    <button id="sendButton" disabled>Отправить</button>
                </div>
                <div id="replyIndicator" class="reply-indicator hide"></div>
                <div id="status"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCF2izLpJOUc90hF2hpnhVLJm4bgmD6xyE",
            authDomain: "database-5cf6d.firebaseapp.com",
            databaseURL: "https://database-5cf6d-default-rtdb.firebaseio.com",
            projectId: "database-5cf6d",
            storageBucket: "database-5cf6d.firebasestorage.app",
            messagingSenderId: "1081787251376",
            appId: "1:1081787251376:web:a4c7847df3956923221975"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const messagesRef = database.ref('messages');
        const usersRef = database.ref('users');

        const messagesEl = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const nameInput = document.getElementById('nameInput');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const authArea = document.getElementById('authArea');
        const inputArea = document.getElementById('inputArea');
        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error');
        const replyIndicator = document.getElementById('replyIndicator');

        let currentUser = null;
        let currentUserName = '';
        let autoScroll = true;
        let replyTo = null;

        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function setError(text) {
            errorEl.textContent = text;
        }

        function setStatus(text) {
            statusEl.textContent = text;
        }

        function showAuth() {
            authArea.classList.remove('hide');
            inputArea.classList.add('hide');
            setError('');
            nameInput.value = localStorage.getItem('chat_username') || '';
            nameInput.focus();
        }

        function showChat() {
            authArea.classList.add('hide');
            inputArea.classList.remove('hide');
            messageInput.focus();
        }

        function formatTime(timestamp) {
            const now = new Date();
            const msgDate = new Date(timestamp);
            if (now - msgDate < 60000) return 'Только что';
            if (now - msgDate < 3600000) return `${Math.floor((now - msgDate) / 60000)} мин. назад`;
            return msgDate.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateSendButton() {
            sendButton.disabled = !messageInput.value.trim();
        }

        function setReplyTo(id, sender, text) {
            replyTo = { id, sender, text };
            replyIndicator.textContent = `Ответ пользователю: ${sender}`;
            replyIndicator.classList.remove('hide');
            messageInput.focus();
            updateSendButton();
        }

        function clearReply() {
            replyTo = null;
            replyIndicator.classList.add('hide');
            updateSendButton();
        }

        async function deleteMessage(id) {
            if (!currentUser) return;

            const messageSnapshot = await messagesRef.child(id).once('value');
            const message = messageSnapshot.val();

            if (message.sender !== currentUser) {
                setStatus('Можно удалять только свои сообщения');
                return;
            }

            try {
                await messagesRef.child(id).remove();
                setStatus('Сообщение удалено');
            } catch (error) {
                setStatus('Ошибка удаления');
            }
        }

        async function login() {
            const name = nameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!name || !password) {
                setError('Введите имя и пароль');
                return;
            }

            try {
                const userSnapshot = await usersRef.child(name).once('value');
                const userData = userSnapshot.val();

                if (!userData) {
                    setError('Пользователь не найден');
                    return;
                }

                const hashedPassword = await hashPassword(password);

                if (userData.password !== hashedPassword) {
                    setError('Неверный пароль');
                    return;
                }

                currentUser = name;
                currentUserName = userData.name || name;
                localStorage.setItem('chat_username', name);
                localStorage.setItem('chat_logged_in', 'true');

                loadMessages();
                showChat();
                setStatus(`Вы вошли как: ${currentUserName}`);
            } catch (error) {
                setError('Ошибка входа');
            }
        }

        async function register() {
            const name = nameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!name || !password) {
                setError('Введите имя и пароль');
                return;
            }

            if (password.length < 4) {
                setError('Пароль должен быть не менее 4 символов');
                return;
            }

            try {
                const userSnapshot = await usersRef.child(name).once('value');

                if (userSnapshot.val()) {
                    setError('Имя уже занято');
                    return;
                }

                const hashedPassword = await hashPassword(password);

                await usersRef.child(name).set({
                    name: name,
                    password: hashedPassword
                });

                currentUser = name;
                currentUserName = name;
                localStorage.setItem('chat_username', name);
                localStorage.setItem('chat_logged_in', 'true');

                loadMessages();
                showChat();
                setStatus(`Вы зарегистрированы как: ${currentUserName}`);
            } catch (error) {
                setError('Ошибка регистрации');
            }
        }

        async function loadMessages() {
            messagesRef.on('value', async (snapshot) => {
                const data = snapshot.val();
                const messages = data ? Object.entries(data).map(([key, value]) => ({ id: key, ...value }))
                    .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp)) : [];

                if (messages.length === 0) {
                    messagesEl.innerHTML = '<div class="empty-state"><h3>Напишите первое сообщение</h3></div>';
                    return;
                }

                const userNames = {};
                for (const msg of messages) {
                    if (msg.sender && !userNames[msg.sender]) {
                        const userData = await usersRef.child(msg.sender).once('value');
                        userNames[msg.sender] = userData.val()?.name || msg.sender;
                    }
                }

                messagesEl.innerHTML = messages.map(msg => {
                    const displayName = userNames[msg.sender] || msg.sender;
                    const isCurrentUser = msg.sender === currentUser;

                    return `
                    <div class="message ${isCurrentUser ? 'user' : 'other'}" data-id="${msg.id}">
                        ${msg.replyTo ? `
                        <div class="reply-preview">
                            <div class="reply-sender">↩ ${escapeHtml(userNames[msg.replyTo.sender] || msg.replyTo.sender)}</div>
                            <div>${escapeHtml(msg.replyTo.text)}</div>
                        </div>` : ''}
                        <div class="message-info">
                            <span class="sender">${escapeHtml(displayName)}</span>
                            <span class="time">${formatTime(msg.timestamp)}</span>
                        </div>
                        <div class="message-content">${escapeHtml(msg.text)}</div>
                        <div class="message-actions">
                            <button class="action-btn" onclick="setReplyTo('${msg.id}', '${msg.sender}', '${msg.text.replace(/'/g, "\\'")}')">↩</button>
                            ${isCurrentUser ? `<button class="action-btn delete" onclick="deleteMessage('${msg.id}')">🗑️</button>` : ''}
                        </div>
                    </div>
                `}).join('');

                if (autoScroll) messagesEl.scrollTop = messagesEl.scrollHeight;
            });
        }

        function sendMessage() {
            if (!currentUser) {
                setStatus('Сначала войдите');
                return;
            }

            const text = messageInput.value.trim();
            if (!text) return;

            const messageData = {
                sender: currentUser,
                text: text,
                timestamp: new Date().toISOString()
            };

            if (replyTo) {
                messageData.replyTo = {
                    sender: replyTo.sender,
                    text: replyTo.text
                };
                clearReply();
            }

            messagesRef.push(messageData);

            messageInput.value = '';
            setStatus('');
            updateSendButton();
            messageInput.focus();
        }

        loginBtn.addEventListener('click', login);
        registerBtn.addEventListener('click', register);
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        messageInput.addEventListener('input', updateSendButton);
        messagesEl.addEventListener('scroll', () => {
            autoScroll = messagesEl.scrollTop + messagesEl.clientHeight >= messagesEl.scrollHeight - 50;
        });
        replyIndicator.addEventListener('click', clearReply);

        window.addEventListener('load', () => {
            const savedUser = localStorage.getItem('chat_username');
            const isLoggedIn = localStorage.getItem('chat_logged_in') === 'true';

            if (savedUser && isLoggedIn) {
                nameInput.value = savedUser;
                passwordInput.value = '';
                login();
            } else {
                showAuth();
            }
        });

        window.setReplyTo = setReplyTo;
        window.deleteMessage = deleteMessage;
        window.clearReply = clearReply;
    </script>
</body>
</html>
