<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost chat</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FFD700;
            --primary-dark: #FFC700;
            --bg: #1a1a1a;
            --bg-card: #2a2a2a;
            --text: #e0e0e0;
            --text-light: #9e9e9e;
            --border: #3a3a3a;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; padding: 10px; }
        .container { width: 100%; max-width: 500px; padding: 15px; display: flex; flex-direction: column; height: 100vh; max-height: 700px; }
        header { text-align: center; padding: 15px 0; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        header h1 { color: var(--primary); font-size: 1.4rem; font-weight: 600; }
        .chat-container { flex: 1; display: flex; flex-direction: column; background: var(--bg-card); border-radius: 12px; overflow: hidden; }
        .messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; flex-direction: column; max-width: 85%; padding: 10px 14px; border-radius: 16px; line-height: 1.4; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; background: var(--primary); color: #1a1a1a; border-bottom-right-radius: 4px; }
        .message.other { align-self: flex-start; background: var(--bg); color: var(--text); border-bottom-left-radius: 4px; }
        .message-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .sender { font-weight: 600; font-size: 0.8rem; }
        .time { font-size: 0.7rem; opacity: 0.6; }
        .message-content { font-size: 0.9rem; word-wrap: break-word; }
        .input-area { padding: 15px; border-top: 1px solid var(--border); background: var(--bg-card); display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 20px; font-size: 0.9rem; background: var(--bg); color: var(--text); outline: none; }
        .input-area input:first-child { flex: 0 0 100px; }
        .input-area input:focus { border-color: var(--primary); }
        .input-area button { padding: 10px 20px; background: var(--primary); color: #1a1a1a; border: none; border-radius: 20px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
        .input-area button:disabled { background: var(--border); cursor: not-allowed; opacity: 0.6; }
        .empty-state { text-align: center; padding: 30px 15px; color: var(--text-light); }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>Ghost chat</h1></header>
        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="empty-state"><h3>Введите имя и напишите сообщение</h3></div>
            </div>
            <div class="input-area">
                <input type="text" id="nameInput" placeholder="Ваше имя..." autocomplete="off">
                <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off">
                <button id="sendButton" disabled>Отправить</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCF2izLpJOUc90hF2hpnhVLJm4bgmD6xyE",
            authDomain: "database-5cf6d.firebaseapp.com",
            databaseURL: "https://database-5cf6d-default-rtdb.firebaseio.com",
            projectId: "database-5cf6d",
            storageBucket: "database-5cf6d.firebasestorage.app",
            messagingSenderId: "1081787251376",
            appId: "1:1081787251376:web:a4c7847df3956923221975"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const messagesRef = database.ref('messages');

        const messagesEl = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const nameInput = document.getElementById('nameInput');
        const sendButton = document.getElementById('sendButton');

        let userName = localStorage.getItem('chat_user_name') || '';
        let autoScroll = true;

        if (userName) nameInput.value = userName;

        messagesRef.on('value', (snapshot) => {
            const data = snapshot.val();
            const messages = data ? Object.entries(data).map(([key, value]) => ({ id: key, ...value }))
                .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp)) : [];

            if (messages.length === 0) {
                messagesEl.innerHTML = '<div class="empty-state"><h3>Введите имя и напишите сообщение</h3></div>';
                return;
            }

            messagesEl.innerHTML = messages.map(msg => `
                <div class="message ${msg.sender === userName ? 'user' : 'other'}">
                    <div class="message-info">
                        <span class="sender">${escapeHtml(msg.sender)}</span>
                        <span class="time">${formatTime(msg.timestamp)}</span>
                    </div>
                    <div class="message-content">${escapeHtml(msg.text)}</div>
                </div>
            `).join('');

            if (autoScroll) messagesEl.scrollTop = messagesEl.scrollHeight;
        });

        function formatTime(timestamp) {
            const now = new Date();
            const msgDate = new Date(timestamp);
            if (now - msgDate < 60000) return 'Только что';
            if (now - msgDate < 3600000) return `${Math.floor((now - msgDate) / 60000)} мин. назад`;
            return msgDate.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateSendButton() {
            sendButton.disabled = !nameInput.value.trim() || !messageInput.value.trim();
        }

        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        messageInput.addEventListener('input', updateSendButton);
        nameInput.addEventListener('input', updateSendButton);
        nameInput.addEventListener('blur', () => {
            if (nameInput.value.trim()) {
                userName = nameInput.value.trim();
                localStorage.setItem('chat_user_name', userName);
            }
        });
        messagesEl.addEventListener('scroll', () => {
            autoScroll = messagesEl.scrollTop + messagesEl.clientHeight >= messagesEl.scrollHeight - 50;
        });

        function sendMessage() {
            const name = nameInput.value.trim();
            const text = messageInput.value.trim();
            if (!name || !text) return;

            userName = name;
            localStorage.setItem('chat_user_name', userName);
            messagesRef.push({ sender: name, text: text, timestamp: new Date().toISOString() });

            messageInput.value = '';
            updateSendButton();
            messageInput.focus();
        }
    </script>
</body>
</html>
